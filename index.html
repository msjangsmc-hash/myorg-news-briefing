<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>뉴스 브리핑 — 2026-05-03</title>
  <style>
    /* ── NomadKit Design System (warm minimalist) ── */
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Serif+Display&family=DM+Mono:wght@400&display=swap');
    :root {
      --font-display: "DM Serif Display", Georgia, serif;
      --font-sans:    "DM Sans", -apple-system, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      --font-mono:    "DM Mono", "Courier New", Consolas, monospace;
      /* NomadKit palette */
      --primary:        #D4A373;
      --primary-hover:  #B8895A;
      --primary-light:  rgba(212,163,115,0.12);
      --ocean:          #0891B2;
      --forest:         #166534;
      --bg:             #FFFDF7;
      --surface:        #FFFFFF;
      --text-primary:   #2C2416;
      --text-secondary: #6B5E4A;
      --neutral:        #A89880;
      --border:         #EDE8DF;
      --border-warm:    #DDD3C4;
      --success:        #166534;
      --warning:        #CA8A04;
      --error:          #DC2626;
      /* elevation */
      --shadow-card:  0 2px 12px rgba(44,36,22,0.06);
      --shadow-hover: 0 8px 28px rgba(44,36,22,0.10);
      /* radius */
      --r-sm:   6px;
      --r-md:   10px;
      --r-card: 14px;
      --r-pill: 9999px;
      /* layout */
      --header-h: 60px;
      --nav-h:    50px;
    }

    /* ── 리셋 ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--text-secondary);
      font-size: 15px;
      line-height: 1.65;
      -webkit-font-smoothing: antialiased;
    }
    a { color: var(--ocean); text-decoration: none; }
    a:hover { color: var(--primary-hover); }

    /* ── 헤더 ── */
    .site-header {
      height: var(--header-h);
      background: rgba(255,253,247,0.92);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-inner {
      max-width: 1080px;
      margin: 0 auto;
      padding: 0 28px;
      height: 100%;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .header-logo {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: var(--font-display);
      font-size: 19px;
      font-weight: 400;
      color: var(--text-primary);
      letter-spacing: 0.01em;
    }
    .header-logo svg { color: var(--primary); }
    .header-date {
      font-size: 13px;
      font-weight: 400;
      color: var(--neutral);
    }
    .header-count {
      margin-left: auto;
      background: var(--primary);
      color: #ffffff;
      font-size: 12px;
      font-weight: 600;
      padding: 3px 12px;
      border-radius: var(--r-pill);
      font-family: var(--font-sans);
    }

    /* ── 키워드 탭 네비 ── */
    .kw-nav {
      height: var(--nav-h);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: var(--header-h);
      z-index: 99;
    }
    .nav-inner {
      max-width: 1080px;
      margin: 0 auto;
      padding: 0 28px;
      height: 100%;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .nav-chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      flex: 1;
      padding: 4px 12px;
      border-radius: var(--r-pill);
      border: 1px solid var(--border-warm);
      font-size: 12px;
      font-weight: 500;
      color: var(--text-secondary);
      background: var(--bg);
      font-family: var(--font-sans);
      transition: all 0.2s ease;
      cursor: pointer;
    }
    .nav-chip svg { width: 13px; height: 13px; stroke-width: 1.5; }
    .nav-chip:hover {
      background: var(--primary);
      color: #ffffff;
      border-color: var(--primary);
    }

    /* ── 메인 레이아웃 ── */
    .page-main {
      max-width: 1080px;
      margin: 0 auto;
      padding: 48px 28px 96px;
    }

    /* ── 섹션 ── */
    .kw-section {
      margin-bottom: 64px;
      scroll-margin-top: calc(var(--header-h) + var(--nav-h) + 20px);
    }
    .section-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--border);
    }
    .section-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      background: var(--primary-light);
      border: 1px solid var(--border-warm);
      border-radius: var(--r-sm);
      color: var(--primary);
      flex-shrink: 0;
    }
    .section-icon svg { width: 16px; height: 16px; stroke-width: 1.5; }
    .section-title {
      font-family: var(--font-display);
      font-size: 22px;
      font-weight: 400;
      color: var(--text-primary);
      letter-spacing: 0.01em;
      line-height: 1.2;
    }
    .section-badge {
      margin-left: auto;
      background: var(--bg);
      color: var(--neutral);
      font-size: 11px;
      font-weight: 400;
      padding: 2px 10px;
      border-radius: var(--r-pill);
      border: 1px solid var(--border-warm);
      font-family: var(--font-mono);
    }
    .empty {
      font-size: 13px;
      color: var(--neutral);
      padding: 32px 0;
      text-align: center;
    }

    /* ── 카드 그리드 ── */
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 20px;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-card);
      padding: 24px;
      box-shadow: var(--shadow-card);
      transition: box-shadow 0.2s ease, transform 0.2s ease, border-color 0.2s;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .card:hover {
      box-shadow: var(--shadow-hover);
      transform: translateY(-2px);
      border-color: var(--border-warm);
    }
    .card-title {
      font-size: 15px;
      font-weight: 500;
      color: var(--text-primary);
      line-height: 1.5;
      font-family: var(--font-sans);
      transition: color 0.15s;
    }
    .card-title:hover { color: var(--primary-hover); cursor: pointer; }
    .card-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .meta-source {
      font-size: 11px;
      font-weight: 500;
      color: var(--neutral);
      font-family: var(--font-mono);
      letter-spacing: 0.02em;
    }
    .meta-date {
      font-size: 12px;
      color: var(--neutral);
      margin-left: auto;
      font-family: var(--font-mono);
    }
    .meta-badge {
      font-size: 11px;
      font-weight: 500;
      padding: 2px 8px;
      border-radius: var(--r-pill);
      font-family: var(--font-sans);
    }
    .meta-badge.intl {
      background: rgba(8,145,178,0.08);
      color: var(--ocean);
      border: 1px solid rgba(8,145,178,0.2);
    }
    .card-desc {
      font-size: 13px;
      font-weight: 400;
      color: var(--text-secondary);
      line-height: 1.65;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* ── 푸터 ── */
    .site-footer {
      border-top: 1px solid var(--border);
      padding: 24px 28px;
      text-align: center;
      font-size: 12px;
      color: var(--neutral);
      font-family: var(--font-mono);
      letter-spacing: 0.02em;
    }

    /* ── 반응형 ── */
    @media (max-width: 640px) {
      .header-inner, .nav-inner, .page-main { padding-left: 16px; padding-right: 16px; }
      .cards { grid-template-columns: 1fr; gap: 12px; }
      .card { padding: 16px; }
      .header-date { display: none; }
      .page-main { padding-top: 32px; padding-bottom: 64px; }
      .section-title { font-size: 18px; }
    }
  </style>
</head>
