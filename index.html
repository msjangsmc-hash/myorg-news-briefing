<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>뉴스 브리핑 — 2026-04-29</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /* ── Vercel (Geist) Design System ── */
    :root {
      --font-sans: "Geist", Arial, "Apple Color Emoji", "Segoe UI Emoji", sans-serif;
      --font-mono: "Geist Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
      /* neutral */
      --bg:          #ffffff;
      --surface:     #fafafa;
      --text-1:      #171717;
      --text-2:      #4d4d4d;
      --text-3:      #666666;
      --text-4:      #808080;
      --border:      #ebebeb;
      /* interactive */
      --link:        #0072f5;
      --focus:       hsla(212,100%,48%,1);
      --badge-bg:    #ebf5ff;
      --badge-text:  #0068d6;
      /* shadow-as-border system */
      --shadow-ring:    rgba(0,0,0,0.08) 0px 0px 0px 1px;
      --shadow-ring-lt: rgb(235,235,235) 0px 0px 0px 1px;
      --shadow-card:    rgba(0,0,0,0.08) 0px 0px 0px 1px, rgba(0,0,0,0.04) 0px 2px 2px, #fafafa 0px 0px 0px 1px;
      /* radius */
      --r-sm:   6px;
      --r-md:   8px;
      --r-lg:   12px;
      --r-pill: 9999px;
      /* layout */
      --header-h: 60px;
      --nav-h:    52px;
    }

    /* ── 리셋 ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font-sans);
      font-feature-settings: "liga";
      background: var(--bg);
      color: var(--text-1);
      font-size: 16px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }
    a { color: inherit; text-decoration: none; }

    /* ── 헤더 ── */
    .site-header {
      height: var(--header-h);
      background: var(--bg);
      box-shadow: 0 1px 0 var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 32px;
      height: 100%;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .header-logo {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 16px;
      font-weight: 600;
      color: var(--text-1);
      letter-spacing: -0.32px;
    }
    .header-logo svg { color: var(--text-1); }
    .header-date {
      font-size: 14px;
      font-weight: 400;
      color: var(--text-3);
    }
    .header-count {
      margin-left: auto;
      background: var(--badge-bg);
      color: var(--badge-text);
      font-size: 12px;
      font-weight: 500;
      padding: 2px 10px;
      border-radius: var(--r-pill);
    }

    /* ── 키워드 탭 네비 ── */
    .kw-nav {
      height: var(--nav-h);
      background: var(--bg);
      box-shadow: 0 1px 0 var(--border);
      position: sticky;
      top: var(--header-h);
      z-index: 99;
    }
    .nav-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 32px;
      height: 100%;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .nav-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 14px;
      border-radius: var(--r-pill);
      box-shadow: var(--shadow-ring-lt);
      font-size: 14px;
      font-weight: 500;
      color: var(--text-2);
      background: var(--bg);
      transition: color 0.15s, background 0.15s;
      cursor: pointer;
    }
    .nav-chip svg { width: 14px; height: 14px; stroke-width: 1.5; }
    .nav-chip:hover {
      background: var(--surface);
      color: var(--text-1);
    }

    /* ── 메인 레이아웃 ── */
    .page-main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 48px 32px 96px;
    }

    /* ── 섹션 ── */
    .kw-section {
      margin-bottom: 64px;
      scroll-margin-top: calc(var(--header-h) + var(--nav-h) + 20px);
    }
    .section-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }
    .section-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      background: var(--surface);
      border-radius: var(--r-sm);
      box-shadow: var(--shadow-ring);
      color: var(--text-1);
      flex-shrink: 0;
    }
    .section-icon svg { width: 16px; height: 16px; stroke-width: 1.5; }
    .section-title {
      font-size: 24px;
      font-weight: 600;
      color: var(--text-1);
      letter-spacing: -0.96px;
    }
    .section-badge {
      margin-left: auto;
      background: var(--surface);
      color: var(--text-3);
      font-size: 12px;
      font-weight: 500;
      padding: 2px 10px;
      border-radius: var(--r-pill);
      box-shadow: var(--shadow-ring-lt);
      font-family: var(--font-mono);
    }
    .empty {
      font-size: 14px;
      color: var(--text-4);
      padding: 32px 0;
      text-align: center;
    }

    /* ── 카드 그리드 ── */
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 16px;
    }
    .card {
      background: var(--bg);
      box-shadow: var(--shadow-card);
      border-radius: var(--r-md);
      padding: 20px 24px;
      transition: box-shadow 0.15s;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .card:hover {
      box-shadow: rgba(0,0,0,0.12) 0px 0px 0px 1px, rgba(0,0,0,0.06) 0px 4px 8px, #fafafa 0px 0px 0px 1px;
    }
    .card-title {
      font-size: 15px;
      font-weight: 500;
      color: var(--text-1);
      line-height: 1.5;
      letter-spacing: -0.15px;
      transition: color 0.12s;
    }
    .card-title:hover { color: var(--link); }
    .card-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .meta-source {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-3);
      font-family: var(--font-mono);
    }
    .meta-date {
      font-size: 12px;
      color: var(--text-4);
      margin-left: auto;
    }
    .meta-badge {
      font-size: 11px;
      font-weight: 500;
      padding: 1px 8px;
      border-radius: var(--r-pill);
    }
    .meta-badge.intl {
      background: var(--badge-bg);
      color: var(--badge-text);
    }
    .card-desc {
      font-size: 14px;
      color: var(--text-2);
      line-height: 1.6;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* ── 푸터 ── */
    .site-footer {
      border-top: 1px solid var(--border);
      padding: 24px 32px;
      text-align: center;
      font-size: 12px;
      color: var(--text-4);
      font-family: var(--font-mono);
    }

    /* ── 반응형 ── */
    @media (max-width: 768px) {
      .header-inner, .nav-inner, .page-main { padding-left: 16px; padding-right: 16px; }
      .cards { grid-template-columns: 1fr; gap: 12px; }
      .card { padding: 16px; }
      .header-date { display: none; }
      .page-main { padding-top: 32px; padding-bottom: 64px; }
    }
  </style>
</head>
<body>
  <!-- Password Gate -->
  <div id="pw-gate" style="position:fixed;inset:0;z-index:9999;background:#ffffff;display:flex;align-items:center;justify-content:center;">
    <div style="background:#ffffff;box-shadow:rgba(0,0,0,0.08) 0px 0px 0px 1px,rgba(0,0,0,0.04) 0px 2px 2px,rgba(0,0,0,0.04) 0px 8px 8px -8px,#fafafa 0px 0px 0px 1px;border-radius:12px;padding:40px 48px;width:100%;max-width:380px;display:flex;flex-direction:column;gap:20px;text-align:center;">
      <div style="display:flex;align-items:center;justify-content:center;gap:8px;font-size:16px;font-weight:600;color:#171717;letter-spacing:-0.32px;">
        <i data-lucide="lock" style="width:18px;height:18px;color:#171717;"></i>
        뉴스 브리핑
      </div>
      <input id="pw-input" type="password" placeholder="비밀번호" autocomplete="current-password"
        style="box-shadow:rgb(235,235,235) 0px 0px 0px 1px;border:none;border-radius:6px;padding:10px 14px;font-size:15px;font-family:inherit;background:#ffffff;color:#171717;outline:none;width:100%;"
        onfocus="this.style.outline='2px solid hsla(212,100%,48%,1)';this.style.outlineOffset='2px'" onblur="this.style.outline='none'"
      />
      <button id="pw-btn" style="background:#171717;color:#ffffff;border:none;border-radius:6px;padding:10px 16px;font-size:14px;font-weight:500;font-family:inherit;cursor:pointer;width:100%;transition:opacity 0.15s;" onmouseover="this.style.opacity=0.85" onmouseout="this.style.opacity=1">확인</button>
      <p id="pw-err" style="font-size:13px;color:#ff5b4f;display:none;">비밀번호가 올바르지 않습니다.</p>
    </div>
  </div>
  <div id="pw-content" style="display:none;">
  <header class="site-header">
    <div class="header-inner">
      <div class="header-logo">
        <i data-lucide="newspaper"></i>
        일일 뉴스 브리핑
      </div>
      <span class="header-date">2026년 4월 29일 (수)</span>
      <span class="header-count">총 1건</span>
    </div>
  </header>

  <nav class="kw-nav" aria-label="키워드 바로가기">
    <div class="nav-inner">
      <a href="#kw-개인정보" class="nav-chip" data-kw="개인정보"><i data-lucide="shield"></i><span>개인정보</span></a>
<a href="#kw-정보보안" class="nav-chip" data-kw="정보보안"><i data-lucide="lock"></i><span>정보보안</span></a>
<a href="#kw-해킹" class="nav-chip" data-kw="해킹"><i data-lucide="zap"></i><span>해킹</span></a>
<a href="#kw-삼성서울병원" class="nav-chip" data-kw="삼성서울병원"><i data-lucide="building-2"></i><span>삼성서울병원</span></a>
    </div>
  </nav>

  <main class="page-main">
    
    <section class="kw-section" id="kw-개인정보">
      <div class="section-header">
        <span class="section-icon"><i data-lucide="shield"></i></span>
        <h2 class="section-title">개인정보</h2>
        <span class="section-badge">1건</span>
      </div>
      <div class="cards">
        
      <article class="card">
        <a class="card-title" href="https://example.com/article/1" target="_blank" rel="noopener noreferrer">[테스트] 개인정보 보호법 개정안 국회 통과</a>
        <div class="card-meta">
          
          <span class="meta-source">연합뉴스</span>
          <span class="meta-date">2026-04-25 09:30</span>
        </div>
        <p class="card-desc">개인정보 보호법 개정안이 국회 본회의를 통과했다. 이번 개정으로 ...</p>
      </article>
      </div>
    </section>

    <section class="kw-section" id="kw-정보보안">
      <div class="section-header">
        <span class="section-icon"><i data-lucide="lock"></i></span>
        <h2 class="section-title">정보보안</h2>
        <span class="section-badge">0건</span>
      </div>
      <div class="cards">
        <p class="empty">수집된 기사가 없습니다.</p>
      </div>
    </section>

    <section class="kw-section" id="kw-해킹">
      <div class="section-header">
        <span class="section-icon"><i data-lucide="zap"></i></span>
        <h2 class="section-title">해킹</h2>
        <span class="section-badge">0건</span>
      </div>
      <div class="cards">
        <p class="empty">수집된 기사가 없습니다.</p>
      </div>
    </section>

    <section class="kw-section" id="kw-삼성서울병원">
      <div class="section-header">
        <span class="section-icon"><i data-lucide="building-2"></i></span>
        <h2 class="section-title">삼성서울병원</h2>
        <span class="section-badge">0건</span>
      </div>
      <div class="cards">
        <p class="empty">수집된 기사가 없습니다.</p>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    마지막 업데이트: 2026-04-30 09:31 KST
  </footer>
  </div><!-- /pw-content -->

  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script>lucide.createIcons();</script>
  <script>
  (function(){
    var HASH = "e315390eb141a7b510dc88c2baf4392fa5f488db4f51d52bc152433b3a6ea1e0";
    var SK = "nb_auth";
    async function sha256(str){
      var buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
      return Array.from(new Uint8Array(buf)).map(function(b){return b.toString(16).padStart(2,"0");}).join("");
    }
    function unlock(){
      document.getElementById("pw-gate").style.display = "none";
      document.getElementById("pw-content").style.display = "";
    }
    if(sessionStorage.getItem(SK) === HASH){ unlock(); return; }
    document.getElementById("pw-gate").style.display = "flex";
    async function attempt(){
      var h = await sha256(document.getElementById("pw-input").value);
      if(h === HASH){
        sessionStorage.setItem(SK, HASH);
        unlock();
      } else {
        document.getElementById("pw-err").style.display = "";
        document.getElementById("pw-input").value = "";
        document.getElementById("pw-input").focus();
      }
    }
    document.getElementById("pw-btn").addEventListener("click", attempt);
    document.getElementById("pw-input").addEventListener("keydown", function(e){ if(e.key==="Enter") attempt(); });
  })();
  </script>
</body>
</html>
