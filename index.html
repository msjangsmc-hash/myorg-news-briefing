<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>뉴스 브리핑 — 2026-05-03</title>
  <style>
    /* ── RawBlock Design System (brutalism) ── */
    @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Work+Sans:wght@400;600;700&family=Space+Mono:wght@400;700&display=swap');
    :root {
      --font-display: "Archivo Black", Impact, "Arial Black", sans-serif;
      --font-sans:    "Work Sans", -apple-system, "Segoe UI", Helvetica, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      --font-mono:    "Space Mono", "Courier New", Consolas, monospace;
      --bg:      #FFFFFF;
      --surface: #F0F0F0;
      --heading: #000000;
      --label:   #000000;
      --body:    #000000;
      --border:  #000000;
      --blue:    #0000FF;
      --header-h: 60px;
      --nav-h:    52px;
    }

    /* ── 리셋 ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--body);
      font-size: 16px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }
    a { color: var(--blue); text-decoration: underline; }

    /* ── 헤더 ── */
    .site-header {
      height: var(--header-h);
      background: var(--bg);
      border-bottom: 5px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-inner {
      max-width: 1080px;
      margin: 0 auto;
      padding: 0 32px;
      height: 100%;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .header-logo {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: var(--font-display);
      font-size: 20px;
      font-weight: 400;
      color: var(--heading);
      letter-spacing: 0.02em;
      text-transform: uppercase;
      text-decoration: none;
    }
    .header-logo svg { color: var(--heading); }
    .header-date {
      font-size: 12px;
      font-weight: 700;
      color: var(--label);
      font-family: var(--font-mono);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .header-count {
      margin-left: auto;
      background: var(--heading);
      color: var(--bg);
      font-size: 12px;
      font-weight: 700;
      padding: 4px 12px;
      border: 3px solid var(--border);
      font-family: var(--font-mono);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    /* ── 키워드 탭 네비 ── */
    .kw-nav {
      height: var(--nav-h);
      background: var(--bg);
      border-bottom: 3px solid var(--border);
      position: sticky;
      top: var(--header-h);
      z-index: 99;
    }
    .nav-inner {
      max-width: 1080px;
      margin: 0 auto;
      padding: 0 32px;
      height: 100%;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .nav-chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      flex: 1;
      padding: 5px 14px;
      border: 2px solid var(--border);
      font-size: 10px;
      font-weight: 700;
      color: var(--label);
      background: var(--bg);
      font-family: var(--font-sans);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: background 0.1s, color 0.1s;
    }
    .nav-chip svg { width: 14px; height: 14px; stroke-width: 2; }
    .nav-chip:hover {
      background: var(--heading);
      color: var(--bg);
    }

    /* ── 메인 레이아웃 ── */
    .page-main {
      max-width: 1080px;
      margin: 0 auto;
      padding: 40px 32px 80px;
    }

    /* ── 섹션 ── */
    .kw-section {
      margin-bottom: 64px;
      scroll-margin-top: calc(var(--header-h) + var(--nav-h) + 20px);
    }
    .section-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
      padding-bottom: 16px;
      border-bottom: 5px solid var(--border);
    }
    .section-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      background: var(--heading);
      color: var(--bg);
      flex-shrink: 0;
    }
    .section-icon svg { width: 16px; height: 16px; stroke-width: 2; }
    .section-title {
      font-family: var(--font-display);
      font-size: 32px;
      font-weight: 400;
      color: var(--heading);
      line-height: 1.1;
      text-transform: uppercase;
    }
    .section-badge {
      margin-left: auto;
      background: var(--bg);
      color: var(--label);
      font-size: 11px;
      font-weight: 700;
      padding: 2px 10px;
      border: 3px solid var(--border);
      font-family: var(--font-mono);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .empty {
      font-size: 14px;
      color: var(--label);
      padding: 32px 0;
      text-align: center;
      font-family: var(--font-mono);
    }

    /* ── 카드 그리드 ── */
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 16px;
    }
    .card {
      background: var(--bg);
      border: 3px solid var(--border);
      padding: 24px;
      box-shadow: none;
      transition: border-width 0.1s;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .card:hover { border-width: 5px; }
    .card-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--heading);
      line-height: 1.5;
      font-family: var(--font-sans);
    }
    .card-title:hover { text-decoration: underline; cursor: pointer; }
    .card-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .meta-source {
      font-size: 11px;
      font-weight: 700;
      color: var(--label);
      font-family: var(--font-mono);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .meta-date {
      font-size: 12px;
      color: var(--label);
      margin-left: auto;
      font-family: var(--font-mono);
    }
    .meta-badge {
      font-size: 10px;
      font-weight: 700;
      padding: 1px 6px;
      font-family: var(--font-mono);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .meta-badge.intl {
      background: var(--bg);
      color: var(--heading);
      border: 2px solid var(--border);
    }
    .card-desc {
      font-size: 14px;
      font-weight: 400;
      color: var(--body);
      line-height: 1.6;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* ── 푸터 ── */
    .site-footer {
      border-top: 5px solid var(--border);
      padding: 24px 32px;
      text-align: center;
      font-size: 12px;
      color: var(--label);
      font-family: var(--font-mono);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    /* ── 반응형 ── */
    @media (max-width: 640px) {
      .header-inner, .nav-inner, .page-main { padding-left: 16px; padding-right: 16px; }
      .cards { grid-template-columns: 1fr; gap: 12px; }
      .card { padding: 16px; }
      .header-date { display: none; }
      .page-main { padding-top: 32px; padding-bottom: 64px; }
      .section-title { font-size: 22px; }
    }
  </style>
</head>
