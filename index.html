<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>뉴스 브리핑 — 2026-04-29</title>
  <style>
    /* ── Supabase Design System tokens ── */
    :root {
      --font-sans: "Circular", "Pretendard", -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      --font-mono: "Source Code Pro", "Menlo", monospace;
      /* brand */
      --green:        #3ecf8e;
      --green-link:   #00c573;
      --green-border: rgba(62, 207, 142, 0.3);
      /* neutral scale */
      --bg-page:      #171717;
      --bg-deep:      #0f0f0f;
      --border-subtle: #242424;
      --border-std:    #2e2e2e;
      --border-strong: #363636;
      --border-alt:    #393939;
      --text-muted:    #898989;
      --text-secondary:#b4b4b4;
      --text-primary:  #fafafa;
      /* overlay */
      --glass:        rgba(41, 41, 41, 0.84);
      /* radius */
      --radius-6:   6px;
      --radius-8:   8px;
      --radius-12:  12px;
      --radius-16:  16px;
      --radius-full: 9999px;
      /* layout */
      --header-h: 60px;
      --nav-h: 52px;
    }

    /* ── 리셋 ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font-sans);
      background: var(--bg-page);
      color: var(--text-primary);
      font-size: 16px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }
    a { color: inherit; text-decoration: none; }

    /* ── 헤더 ── */
    .site-header {
      height: var(--header-h);
      background: var(--bg-deep);
      border-bottom: 1px solid var(--border-std);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-inner {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 32px;
      height: 100%;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .header-logo {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 17px;
      font-weight: 500;
      color: var(--text-primary);
    }
    .header-logo svg { color: var(--green); }
    .header-date {
      font-size: 14px;
      font-weight: 400;
      color: var(--text-muted);
    }
    .header-count {
      margin-left: auto;
      background: var(--bg-deep);
      color: var(--text-primary);
      font-size: 12px;
      font-weight: 500;
      padding: 4px 14px;
      border-radius: var(--radius-full);
      border: 1px solid var(--green-border);
      color: var(--green);
    }

    /* ── 키워드 탭 네비 ── */
    .kw-nav {
      height: var(--nav-h);
      background: var(--bg-deep);
      border-bottom: 1px solid var(--border-std);
      position: sticky;
      top: var(--header-h);
      z-index: 99;
    }
    .nav-inner {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 32px;
      height: 100%;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .nav-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: var(--radius-full);
      border: 1px solid var(--border-std);
      font-size: 14px;
      font-weight: 500;
      color: var(--text-secondary);
      transition: color 0.15s, border-color 0.15s;
      cursor: pointer;
    }
    .nav-chip svg { width: 14px; height: 14px; stroke-width: 1.5; }
    .nav-chip:hover {
      color: var(--green-link);
      border-color: var(--green-border);
    }

    /* ── 메인 레이아웃 ── */
    .page-main {
      max-width: 1280px;
      margin: 0 auto;
      padding: 48px 32px 96px;
    }

    /* ── 섹션 ── */
    .kw-section {
      margin-bottom: 64px;
      scroll-margin-top: calc(var(--header-h) + var(--nav-h) + 20px);
    }
    .section-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border-subtle);
    }
    .section-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      background: var(--bg-deep);
      border-radius: var(--radius-8);
      border: 1px solid var(--green-border);
      color: var(--green);
      flex-shrink: 0;
    }
    .section-icon svg { width: 16px; height: 16px; stroke-width: 1.5; }
    .section-title {
      font-size: 24px;
      font-weight: 400;
      color: var(--text-primary);
      letter-spacing: -0.16px;
    }
    .section-badge {
      margin-left: auto;
      background: var(--bg-deep);
      color: var(--text-muted);
      font-size: 12px;
      font-weight: 500;
      padding: 3px 10px;
      border-radius: var(--radius-full);
      border: 1px solid var(--border-std);
      font-family: var(--font-mono);
      letter-spacing: 1.2px;
      text-transform: uppercase;
    }
    .empty {
      font-size: 14px;
      color: var(--text-muted);
      padding: 32px 0;
      text-align: center;
    }

    /* ── 카드 그리드 ── */
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 16px;
    }
    .card {
      background: var(--bg-page);
      border: 1px solid var(--border-std);
      border-radius: var(--radius-8);
      padding: 20px 24px;
      transition: border-color 0.15s;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .card:hover {
      border-color: var(--border-strong);
    }
    .card-title {
      font-size: 15px;
      font-weight: 400;
      color: var(--text-primary);
      line-height: 1.5;
      transition: color 0.12s;
    }
    .card-title:hover { color: var(--green-link); }
    .card-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .meta-source {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
      font-family: var(--font-mono);
      letter-spacing: 1.2px;
      text-transform: uppercase;
    }
    .meta-date {
      font-size: 12px;
      color: var(--text-muted);
      margin-left: auto;
    }
    .meta-badge {
      font-size: 11px;
      font-weight: 500;
      padding: 2px 8px;
      border-radius: var(--radius-full);
    }
    .meta-badge.intl {
      background: var(--bg-deep);
      color: var(--text-secondary);
      border: 1px solid var(--border-std);
    }
    .card-desc {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.6;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* ── 푸터 ── */
    .site-footer {
      border-top: 1px solid var(--border-subtle);
      padding: 24px 32px;
      text-align: center;
      font-size: 12px;
      color: var(--text-muted);
      font-family: var(--font-mono);
      letter-spacing: 1.2px;
      text-transform: uppercase;
    }

    /* ── 반응형 ── */
    @media (max-width: 600px) {
      .header-inner, .nav-inner, .page-main { padding-left: 16px; padding-right: 16px; }
      .cards { grid-template-columns: 1fr; gap: 12px; }
      .card { padding: 16px; }
      .header-date { display: none; }
      .page-main { padding-top: 32px; padding-bottom: 64px; }
    }
  </style>
</head>
<body>
  <!-- Password Gate -->
  <div id="pw-gate" style="position:fixed;inset:0;z-index:9999;background:#171717;display:flex;align-items:center;justify-content:center;">
    <div style="background:#0f0f0f;border:1px solid #2e2e2e;border-radius:16px;padding:40px 48px;width:100%;max-width:380px;display:flex;flex-direction:column;gap:20px;text-align:center;">
      <div style="display:flex;align-items:center;justify-content:center;gap:8px;font-size:16px;font-weight:400;color:#fafafa;">
        <i data-lucide="lock" style="width:20px;height:20px;color:#3ecf8e;"></i>
        뉴스 브리핑
      </div>
      <input id="pw-input" type="password" placeholder="비밀번호" autocomplete="current-password"
        style="border:1px solid #363636;border-radius:6px;padding:12px 16px;font-size:15px;font-family:inherit;background:#171717;color:#fafafa;outline:none;width:100%;"
      />
      <button id="pw-btn" style="background:#0f0f0f;color:#fafafa;border:1px solid #fafafa;border-radius:9999px;padding:10px 32px;font-size:14px;font-weight:500;font-family:inherit;cursor:pointer;width:100%;transition:opacity 0.15s;" onmouseover="this.style.opacity=0.8" onmouseout="this.style.opacity=1">확인</button>
      <p id="pw-err" style="font-size:13px;color:#ff6369;display:none;">비밀번호가 올바르지 않습니다.</p>
    </div>
  </div>
  <div id="pw-content" style="display:none;">
  <header class="site-header">
    <div class="header-inner">
      <div class="header-logo">
        <i data-lucide="newspaper"></i>
        일일 뉴스 브리핑
      </div>
      <span class="header-date">2026년 4월 29일 (수)</span>
      <span class="header-count">총 1건</span>
    </div>
  </header>

  <nav class="kw-nav" aria-label="키워드 바로가기">
    <div class="nav-inner">
      <a href="#kw-개인정보" class="nav-chip" data-kw="개인정보"><i data-lucide="shield"></i><span>개인정보</span></a>
<a href="#kw-정보보안" class="nav-chip" data-kw="정보보안"><i data-lucide="lock"></i><span>정보보안</span></a>
<a href="#kw-해킹" class="nav-chip" data-kw="해킹"><i data-lucide="zap"></i><span>해킹</span></a>
<a href="#kw-삼성서울병원" class="nav-chip" data-kw="삼성서울병원"><i data-lucide="building-2"></i><span>삼성서울병원</span></a>
    </div>
  </nav>

  <main class="page-main">
    
    <section class="kw-section" id="kw-개인정보">
      <div class="section-header">
        <span class="section-icon"><i data-lucide="shield"></i></span>
        <h2 class="section-title">개인정보</h2>
        <span class="section-badge">1건</span>
      </div>
      <div class="cards">
        
      <article class="card">
        <a class="card-title" href="https://example.com/article/1" target="_blank" rel="noopener noreferrer">[테스트] 개인정보 보호법 개정안 국회 통과</a>
        <div class="card-meta">
          
          <span class="meta-source">연합뉴스</span>
          <span class="meta-date">2026-04-25 09:30</span>
        </div>
        <p class="card-desc">개인정보 보호법 개정안이 국회 본회의를 통과했다. 이번 개정으로 ...</p>
      </article>
      </div>
    </section>

    <section class="kw-section" id="kw-정보보안">
      <div class="section-header">
        <span class="section-icon"><i data-lucide="lock"></i></span>
        <h2 class="section-title">정보보안</h2>
        <span class="section-badge">0건</span>
      </div>
      <div class="cards">
        <p class="empty">수집된 기사가 없습니다.</p>
      </div>
    </section>

    <section class="kw-section" id="kw-해킹">
      <div class="section-header">
        <span class="section-icon"><i data-lucide="zap"></i></span>
        <h2 class="section-title">해킹</h2>
        <span class="section-badge">0건</span>
      </div>
      <div class="cards">
        <p class="empty">수집된 기사가 없습니다.</p>
      </div>
    </section>

    <section class="kw-section" id="kw-삼성서울병원">
      <div class="section-header">
        <span class="section-icon"><i data-lucide="building-2"></i></span>
        <h2 class="section-title">삼성서울병원</h2>
        <span class="section-badge">0건</span>
      </div>
      <div class="cards">
        <p class="empty">수집된 기사가 없습니다.</p>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    마지막 업데이트: 2026-04-30 09:25 KST
  </footer>
  </div><!-- /pw-content -->

  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script>lucide.createIcons();</script>
  <script>
  (function(){
    var HASH = "e315390eb141a7b510dc88c2baf4392fa5f488db4f51d52bc152433b3a6ea1e0";
    var SK = "nb_auth";
    async function sha256(str){
      var buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
      return Array.from(new Uint8Array(buf)).map(function(b){return b.toString(16).padStart(2,"0");}).join("");
    }
    function unlock(){
      document.getElementById("pw-gate").style.display = "none";
      document.getElementById("pw-content").style.display = "";
    }
    if(sessionStorage.getItem(SK) === HASH){ unlock(); return; }
    document.getElementById("pw-gate").style.display = "flex";
    async function attempt(){
      var h = await sha256(document.getElementById("pw-input").value);
      if(h === HASH){
        sessionStorage.setItem(SK, HASH);
        unlock();
      } else {
        document.getElementById("pw-err").style.display = "";
        document.getElementById("pw-input").value = "";
        document.getElementById("pw-input").focus();
      }
    }
    document.getElementById("pw-btn").addEventListener("click", attempt);
    document.getElementById("pw-input").addEventListener("keydown", function(e){ if(e.key==="Enter") attempt(); });
  })();
  </script>
</body>
</html>
