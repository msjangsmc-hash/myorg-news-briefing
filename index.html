<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>뉴스 브리핑 — 2026-04-29</title>
  <style>
    /* ── Stripe Design System ── */
    @import url('https://fonts.googleapis.com/css2?family=Source+Code+Pro:wght@400;500;700&display=swap');
    :root {
      --font-sans: "sohne-var", "SF Pro Display", -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", Arial, sans-serif;
      --font-mono: "Source Code Pro", "SFMono-Regular", Menlo, monospace;
      /* neutral */
      --bg:        #ffffff;
      --surface:   #f6f9fc;
      --heading:   #061b31;
      --label:     #273951;
      --body:      #64748d;
      --border:    #e5edf5;
      /* brand */
      --purple:    #533afd;
      --purple-hv: #4434d4;
      --purple-lt: #b9b9f9;
      --dark-sect: #1c1e54;
      /* accent (장식 전용) */
      --ruby:      #ea2261;
      --magenta:   #f96bee;
      /* shadow */
      --shadow-ambient:  rgba(23,23,23,0.06) 0px 3px 6px;
      --shadow-standard: rgba(23,23,23,0.08) 0px 15px 35px;
      --shadow-elevated: rgba(50,50,93,0.25) 0px 30px 45px -30px, rgba(0,0,0,0.1) 0px 18px 36px -18px;
      /* radius */
      --r-sm:  4px;
      --r-md:  6px;
      --r-lg:  8px;
      /* layout */
      --header-h: 60px;
      --nav-h:    52px;
    }

    /* ── 리셋 ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font-sans);
      font-feature-settings: "ss01";
      background: var(--bg);
      color: var(--body);
      font-size: 16px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }
    a { color: inherit; text-decoration: none; }

    /* ── 헤더 ── */
    .site-header {
      height: var(--header-h);
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-inner {
      max-width: 1080px;
      margin: 0 auto;
      padding: 0 32px;
      height: 100%;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .header-logo {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 16px;
      font-weight: 400;
      color: var(--heading);
      letter-spacing: -0.26px;
      font-feature-settings: "ss01";
    }
    .header-logo svg { color: var(--purple); }
    .header-date {
      font-size: 13px;
      font-weight: 400;
      color: var(--body);
    }
    .header-count {
      margin-left: auto;
      background: var(--purple);
      color: #ffffff;
      font-size: 12px;
      font-weight: 400;
      padding: 3px 10px;
      border-radius: var(--r-sm);
      font-feature-settings: "ss01";
    }

    /* ── 키워드 탭 네비 ── */
    .kw-nav {
      height: var(--nav-h);
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: var(--header-h);
      z-index: 99;
    }
    .nav-inner {
      max-width: 1080px;
      margin: 0 auto;
      padding: 0 32px;
      height: 100%;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .nav-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 14px;
      border-radius: var(--r-md);
      border: 1px solid var(--border);
      font-size: 13px;
      font-weight: 400;
      color: var(--label);
      background: var(--bg);
      font-feature-settings: "ss01";
      transition: color 0.15s, border-color 0.15s, background 0.15s;
      cursor: pointer;
    }
    .nav-chip svg { width: 14px; height: 14px; stroke-width: 1.5; }
    .nav-chip:hover {
      color: var(--purple);
      border-color: var(--purple-lt);
      background: rgba(83,58,253,0.03);
    }

    /* ── 메인 레이아웃 ── */
    .page-main {
      max-width: 1080px;
      margin: 0 auto;
      padding: 48px 32px 96px;
    }

    /* ── 섹션 ── */
    .kw-section {
      margin-bottom: 64px;
      scroll-margin-top: calc(var(--header-h) + var(--nav-h) + 20px);
    }
    .section-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }
    .section-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      background: rgba(83,58,253,0.06);
      border-radius: var(--r-sm);
      border: 1px solid var(--purple-lt);
      color: var(--purple);
      flex-shrink: 0;
    }
    .section-icon svg { width: 16px; height: 16px; stroke-width: 1.5; }
    .section-title {
      font-size: 22px;
      font-weight: 300;
      color: var(--heading);
      letter-spacing: -0.22px;
      font-feature-settings: "ss01";
    }
    .section-badge {
      margin-left: auto;
      background: var(--surface);
      color: var(--body);
      font-size: 12px;
      font-weight: 400;
      padding: 2px 10px;
      border-radius: var(--r-sm);
      border: 1px solid var(--border);
      font-family: var(--font-mono);
    }
    .empty {
      font-size: 14px;
      color: var(--body);
      padding: 32px 0;
      text-align: center;
    }

    /* ── 카드 그리드 ── */
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 16px;
    }
    .card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      padding: 20px 24px;
      box-shadow: var(--shadow-ambient);
      transition: box-shadow 0.2s, border-color 0.2s;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .card:hover {
      border-color: var(--purple-lt);
      box-shadow: var(--shadow-elevated);
    }
    .card-title {
      font-size: 15px;
      font-weight: 300;
      color: var(--heading);
      line-height: 1.5;
      letter-spacing: -0.1px;
      font-feature-settings: "ss01";
      transition: color 0.12s;
    }
    .card-title:hover { color: var(--purple); }
    .card-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .meta-source {
      font-size: 11px;
      font-weight: 500;
      color: var(--body);
      font-family: var(--font-mono);
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }
    .meta-date {
      font-size: 12px;
      color: var(--body);
      margin-left: auto;
      font-feature-settings: "tnum";
    }
    .meta-badge {
      font-size: 10px;
      font-weight: 300;
      padding: 1px 6px;
      border-radius: var(--r-sm);
      font-feature-settings: "ss01";
    }
    .meta-badge.intl {
      background: rgba(83,58,253,0.08);
      color: var(--purple);
      border: 1px solid var(--purple-lt);
    }
    .card-desc {
      font-size: 14px;
      font-weight: 300;
      color: var(--body);
      line-height: 1.6;
      font-feature-settings: "ss01";
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* ── 푸터 ── */
    .site-footer {
      border-top: 1px solid var(--border);
      padding: 24px 32px;
      text-align: center;
      font-size: 12px;
      color: var(--body);
      font-family: var(--font-mono);
    }

    /* ── 반응형 ── */
    @media (max-width: 640px) {
      .header-inner, .nav-inner, .page-main { padding-left: 16px; padding-right: 16px; }
      .cards { grid-template-columns: 1fr; gap: 12px; }
      .card { padding: 16px; border-radius: var(--r-sm); }
      .header-date { display: none; }
      .page-main { padding-top: 32px; padding-bottom: 64px; }
      .section-title { font-size: 18px; }
    }
  </style>
</head>
<body>
  <!-- Password Gate -->
  <div id="pw-gate" style="position:fixed;inset:0;z-index:9999;background:#f6f9fc;display:flex;align-items:center;justify-content:center;">
    <div style="background:#ffffff;border:1px solid #e5edf5;border-radius:8px;box-shadow:rgba(50,50,93,0.25) 0px 30px 45px -30px,rgba(0,0,0,0.1) 0px 18px 36px -18px;padding:40px 48px;width:100%;max-width:380px;display:flex;flex-direction:column;gap:20px;text-align:center;">
      <div style="display:flex;align-items:center;justify-content:center;gap:8px;font-size:18px;font-weight:300;color:#061b31;letter-spacing:-0.22px;font-feature-settings:'ss01';">
        <i data-lucide="lock" style="width:18px;height:18px;color:#533afd;"></i>
        뉴스 브리핑
      </div>
      <input id="pw-input" type="password" placeholder="비밀번호" autocomplete="current-password"
        style="border:1px solid #e5edf5;border-radius:4px;padding:10px 14px;font-size:15px;font-weight:300;font-feature-settings:'ss01';font-family:inherit;background:#ffffff;color:#061b31;outline:none;width:100%;transition:border-color 0.15s;"
        onfocus="this.style.borderColor='#533afd'" onblur="this.style.borderColor='#e5edf5'"
      />
      <button id="pw-btn" style="background:#533afd;color:#ffffff;border:none;border-radius:4px;padding:10px 16px;font-size:15px;font-weight:400;font-feature-settings:'ss01';font-family:inherit;cursor:pointer;width:100%;transition:background 0.15s;" onmouseover="this.style.background='#4434d4'" onmouseout="this.style.background='#533afd'">확인</button>
      <p id="pw-err" style="font-size:13px;color:#ea2261;display:none;">비밀번호가 올바르지 않습니다.</p>
    </div>
  </div>
  <div id="pw-content" style="display:none;">
  <header class="site-header">
    <div class="header-inner">
      <div class="header-logo">
        <i data-lucide="newspaper"></i>
        일일 뉴스 브리핑
      </div>

      <span class="header-count">총 1건</span>
    </div>
  </header>

  <nav class="kw-nav" aria-label="키워드 바로가기">
    <div class="nav-inner">
      <a href="#kw-개인정보" class="nav-chip" data-kw="개인정보"><i data-lucide="shield"></i><span>개인정보</span></a>
<a href="#kw-정보보안" class="nav-chip" data-kw="정보보안"><i data-lucide="lock"></i><span>정보보안</span></a>
<a href="#kw-해킹" class="nav-chip" data-kw="해킹"><i data-lucide="zap"></i><span>해킹</span></a>
<a href="#kw-삼성서울병원" class="nav-chip" data-kw="삼성서울병원"><i data-lucide="building-2"></i><span>삼성서울병원</span></a>
    </div>
  </nav>

  <main class="page-main">
    
    <section class="kw-section" id="kw-개인정보">
      <div class="section-header">
        <span class="section-icon"><i data-lucide="shield"></i></span>
        <h2 class="section-title">개인정보</h2>
        <span class="section-badge">1건</span>

      <div class="cards">
        
      <article class="card">
        <a class="card-title" href="https://example.com/article/1" target="_blank" rel="noopener noreferrer">[테스트] 개인정보 보호법 개정안 국회 통과</a>
        <div class="card-meta">
          
          <span class="meta-source">연합뉴스</span>

        <p class="card-desc">개인정보 보호법 개정안이 국회 본회의를 통과했다. 이번 개정으로 ...</p>
      </article>

    <section class="kw-section" id="kw-정보보안">
      <div class="section-header">
        <span class="section-icon"><i data-lucide="lock"></i></span>

  <footer class="site-footer">
    마지막 업데이트: 2026-04-30 09:48 KST
  </footer>
  </div><!-- /pw-content -->

  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script>lucide.createIcons();</script>
  <script>
  (function(){
    var HASH = "e315390eb141a7b510dc88c2baf4392fa5f488db4f51d52bc152433b3a6ea1e0";
    var SK = "nb_auth";
    async function sha256(str){
      var buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
      return Array.from(new Uint8Array(buf)).map(function(b){return b.toString(16).padStart(2,"0");}).join("");
    }
    function unlock(){
      document.getElementById("pw-gate").style.display = "none";
      document.getElementById("pw-content").style.display = "";
    }
    if(sessionStorage.getItem(SK) === HASH){ unlock(); return; }
    document.getElementById("pw-gate").style.display = "flex";
    async function attempt(){
      var h = await sha256(document.getElementById("pw-input").value);
      if(h === HASH){
        sessionStorage.setItem(SK, HASH);
        unlock();
      } else {
        document.getElementById("pw-err").style.display = "";
        document.getElementById("pw-input").value = "";
        document.getElementById("pw-input").focus();
      }
    }
    document.getElementById("pw-btn").addEventListener("click", attempt);
    document.getElementById("pw-input").addEventListener("keydown", function(e){ if(e.key==="Enter") attempt(); });
  })();
  </script>
</body>
</html>
